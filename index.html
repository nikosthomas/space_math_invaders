<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Space Math Invaders - Hard Mode</title>
	<link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            background: #000022;
        }

        /* UI Στοιχεία */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #hud {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 1px 1px 2px #003300;
        }

        /* Κουμπιά Ελέγχου */
        #controls-container {
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            padding-bottom: 40px;
        }

        .movement-controls {
            display: flex;
            gap: 20px;
        }

        .fire-control {
            display: flex;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #00ff00;
            color: #00ff00;
            width: 90px;
            height: 90px;
            border-radius: 15px;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            touch-action: manipulation;
        }

        .btn-fire {
            border-color: #ff3300;
            color: #ff3300;
            background: rgba(255, 50, 0, 0.1);
            border-radius: 50%;
            width: 110px;
            height: 110px;
        }

        .control-btn:active { background: rgba(255, 255, 255, 0.4); }
        .btn-fire:active { background: rgba(255, 50, 0, 0.4); }


        /* Παράθυρο Ερώτησης (Modal) */
        #questionModal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 30, 0.98);
            border: 4px solid #00ff00;
            box-shadow: 0 0 30px #00ff00;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            width: 70%;
            max-width: 800px;
            pointer-events: auto;
            display: none;
            z-index: 50;
        }

        #questionText {
            font-size: 32px;
            margin-bottom: 40px;
            color: white;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .answer-btn {
            background: #004400;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 25px;
            font-size: 26px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s;
        }

        .answer-btn:hover { background: #006600; transform: scale(1.05); }
        .answer-btn:active { transform: scale(0.95); }

        /* Οθόνες */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
        }

        .title-text {
            font-size: 60px;
            color: #00ff00;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-align: center;
        }

        .big-btn {
            background: #00ff00;
            color: black;
            font-size: 35px;
            padding: 20px 50px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            margin-top: 30px;
        }
        .big-btn:hover { background: white; }

        .hidden { display: none !important; }
        
        #feedbackMsg {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 60;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="hud">
            <span>ΣΚΟΡ: <span id="scoreDisplay">0</span></span>
            <span>ΕΠΙΠΕΔΟ: <span id="levelDisplay">1</span></span>
        </div>
        
        <div id="controls-container">
            <div class="movement-controls">
                <div class="control-btn" id="btnLeft">◀</div>
                <div class="control-btn" id="btnRight">▶</div>
            </div>
            <div class="fire-control">
                <div class="control-btn btn-fire" id="btnFire">🔥</div>
            </div>
        </div>
    </div>

    <div id="questionModal">
        <h2 style="color: #00ff00;">ΜΑΘΗΜΑΤΙΚΗ ΕΠΙΘΕΣΗ!</h2>
        <div id="questionText">Ερώτηση...</div>
        <div class="answers-grid" id="answersContainer"></div>
    </div>

    <div id="feedbackMsg">ΣΩΣΤΟ!</div>

    <div id="startScreen" class="overlay">
        <div class="title-text">SPACE MATH INVADERS</div>
        <p style="font-size: 24px;">Κατάστρεψε τους εξωγήινους.</p>
        <p style="font-size: 24px; color: yellow;">ΠΡΟΣΟΧΗ: Η ταχύτητα αυξάνεται συνέχεια!</p>
        <button class="big-btn" onclick="startGame()">START MISSION</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <div class="title-text" style="color: red;">GAME OVER</div>
        <p style="font-size: 30px;">Έφτασες στο Επίπεδο: <span id="finalLevel"></span></p>
        <p style="font-size: 30px;">Τελικό Σκορ: <span id="finalScore"></span></p>
        <button class="big-btn" onclick="startGame()">RETRY</button>
    </div>

    <script>
        // ==========================================
        // ΕΡΩΤΗΣΕΙΣ (Α Γυμνασίου)
        // ==========================================
        const questionsPool = [
            { q: "Λύσε την εξίσωση: 5+x = 15", options: ["x=5", "x=10", "x=15", "x=20"], correct: 1 },
			{ q: "Λύσε την εξίσωση: x-12 = 1", options: ["x=11", "x=1", "x=21", "x=13"], correct: 3 },
			{ q: "Λύσε την εξίσωση: x+7 = 19", options: ["x=5", "x=12", "x=3", "x=45"], correct: 1 },
			{ q: "Λύσε την εξίσωση: x+1 = 20", options: ["x=19", "x=12", "x=3", "x=45"], correct: 0 },
			{ q: "Λύσε την εξίσωση: x-7 = 10", options: ["x=5", "x=12", "x=3", "x=17"], correct: 3 },
            { q: "Πόσο κάνει 4² (τέσσερα στο τετράγουο);", options: ["8", "12", "16", "24"], correct: 2 },
			{ q: "Πόσο κάνει 1² (ένα στο τετράγωνο);", options: ["1", "2", "6", "0"], correct: 0 },
			{ q: "Πόσο κάνει 8² (οχτώ στο τετράγωνο);", options: ["88", "16", "56", "64"], correct: 3 },
			{ q: "Πόσο κάνει 6² (έξι στο τετράγωνο);", options: ["12", "8", "36", "54"], correct: 2 },
			{ q: "Πόσο κάνει 9² (εννέα στο τετράγωνο);", options: ["11", "512", "18", "81"], correct: 3 },
			{ q: "Πόσο κάνει 7² (εφτά στο τετράγωνο);", options: ["49", "14", "32", "9"], correct: 0 },
            { q: "Λύσε την εξίσωση: 3x = 15", options: ["x=5", "x=12", "x=3", "x=45"], correct: 0 },
			{ q: "Λύσε την εξίσωση: 3+x = 15", options: ["x=5", "x=1", "x=12", "x=45"], correct: 2 },
			{ q: "Λύσε την εξίσωση: 5x = 15", options: ["x=5", "x=12", "x=3", "x=45"], correct: 2 },
			{ q: "Λύσε την εξίσωση: 3x+1 = 13", options: ["x=5", "x=12", "x=3", "x=4"], correct: 3 },
			{ q: "Λύσε την εξίσωση: 2x-1 = 19", options: ["x=5", "x=10", "x=12", "x=13"], correct: 1 },
            { q: "Ποιος αριθμός είναι πρώτος;", options: ["9", "15", "17", "21"], correct: 2 },
			{ q: "Ποιος αριθμός είναι πρώτος;", options: ["9", "15", "18", "23"], correct: 3 },
			{ q: "Ποιος αριθμός είναι πρώτος;", options: ["17", "15", "14", "27"], correct: 0 },
            { q: "Ποιος αριθμός είναι πρώτος;", options: ["1", "6", "7", "35"], correct: 2 },
			{ q: "Ποιος αριθμός είναι περιττός;", options: ["200", "12", "18", "21"], correct: 3 },
			{ q: "Ποιος αριθμός είναι περιττός;", options: ["20", "101", "182", "210"], correct: 1 },
			{ q: "Ποιος αριθμός είναι περιττός;", options: ["200", "201", "202", "210"], correct: 1 },
			{ q: "Ποιος αριθμός είναι άρτιος;", options: ["9", "15", "17", "22"], correct: 3 },
			{ q: "Ποιος αριθμός είναι άρτιος;", options: ["8", "11", "17", "21"], correct: 0 },
			{ q: "Ποιος αριθμός είναι πρώτος;", options: ["23", "25", "27", "32"], correct: 0 },
            { q: "Ποιο κλάσμα είναι μικρότερο;", options: ["1/2", "1/3", "1/4", "1/5"], correct: 3 },
			{ q: "Ποιο κλάσμα είναι μικρότερο;", options: ["3/11", "4/11", "5/11", "6/11"], correct: 0 },
			{ q: "Ποιο κλάσμα είναι μικρότερο;", options: ["23/7", "23/8", "23/9", "23/10"], correct: 3 },
			{ q: "Το Ε.Κ.Π. των 2 και 6 είναι:", options: ["12", "24", "6", "2"], correct: 2 },
			{ q: "Το Ε.Κ.Π. των 5 και 6 είναι:", options: ["1", "5", "6", "30"], correct: 3 },
			{ q: "Ο Μ.Κ.Δ. των 4 και 6 είναι:", options: ["12", "24", "4", "2"], correct: 3 },
            { q: "Ο Μ.Κ.Δ. των 15 και 10 είναι:", options: ["15", "10", "5", "1"], correct: 2 },
            { q: "Το 20% του 200 είναι:", options: ["20", "25", "40", "400"], correct: 2 },
			{ q: "Το 15% του 300 είναι:", options: ["35", "50", "45", "60"], correct: 2 },
            { q: "Το Ε.Κ.Π. των 4 και 6 είναι:", options: ["12", "24", "10", "2"], correct: 0 },
			{ q: "Το Ε.Κ.Π. των 6 και 8 είναι:", options: ["12", "24", "16", "2"], correct: 1 },
			{ q: "Το Ε.Κ.Π. των 2 και 3 είναι:", options: ["2", "3", "6", "12"], correct: 2 },
            { q: "Το 25% του 200 είναι:", options: ["25", "50", "100", "75"], correct: 1 },
            { q: "Αν x + 3 = 10, τότε το x είναι:", options: ["13", "7", "12", "30"], correct: 1 },
			{ q: "Αν x + 4 = 10, τότε το x είναι:", options: ["13", "6", "1", "30"], correct: 1 },
			{ q: "Το 5% του 1000 είναι:", options: ["25", "50", "100", "75"], correct: 1 }
        ];

        // Δυναμική λίστα για τις εναπομείνασες ερωτήσεις
        let activeQuestionsPool = [];

        // ==========================================
        // ΡΥΘΜΙΣΕΙΣ & ΗΧΟΙ
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        let gameState = "START"; 
        let score = 0;
        let level = 1;
        let animationId;
        let killsSinceLastQuiz = 0;
        const KILLS_TO_TRIGGER_QUIZ = 10;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            switch(type) {
                case 'shoot':
                    osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                    break;
                case 'hit':
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                    break;
                case 'correct':
                    osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); gain.gain.setValueAtTime(0.2, now);
                    osc.start(now); osc.stop(now + 0.1);
                    setTimeout(()=>{
                        const osc2=audioCtx.createOscillator(); const gain2=audioCtx.createGain();
                        osc2.connect(gain2); gain2.connect(audioCtx.destination);
                        osc2.type='sine'; osc2.frequency.setValueAtTime(900, now+0.15); gain2.gain.setValueAtTime(0.2, now+0.15);
                        osc2.start(now+0.15); osc2.stop(now+0.3);
                    }, 150);
                    break;
                case 'wrong':
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); gain.gain.setValueAtTime(0.3, now);
                    osc.start(now); osc.stop(now + 0.3);
                    break;
            }
        }

        // ==========================================
        // ΑΝΤΙΚΕΙΜΕΝΑ
        // ==========================================
        const player = {
            x: 0, y: 0, width: 60, height: 40, speed: 10, color: '#00ff00',
            draw: function() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y + 20, this.width, 20); 
                ctx.fillRect(this.x + this.width/2 - 8, this.y, 16, 20);
            }
        };

        let bullets = [];
        class Bullet {
            constructor(x, y) {
                this.x = x; this.y = y; this.width = 6; this.height = 15; this.speed = 15; this.active = true;
            }
            update() { this.y -= this.speed; if (this.y + this.height < 0) this.active = false; }
            draw() { ctx.fillStyle = '#ffff00'; ctx.fillRect(this.x, this.y, this.width, this.height); }
        }

        let aliens = [];
        let alienDirection = 1; 
        let currentAlienSpeed = 1.5;

        class Alien {
            constructor(x, y) {
                this.x = x; this.y = y; this.width = 40; this.height = 30; this.alive = true;
            }
            draw() {
                if (!this.alive) return;
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(this.x + 5, this.y, 30, 10);
                ctx.fillRect(this.x, this.y + 10, 40, 10);
                ctx.fillRect(this.x + 5, this.y + 20, 10, 10);
                ctx.fillRect(this.x + 25, this.y + 20, 10, 10);
            }
        }

        function createAlienWave() {
            aliens = [];
            const rows = 4;
            const cols = 8;
            const padding = 20;
            const startX = (width - (cols * (40 + padding))) / 2;
            
            let startY = 70 + ((level - 1) * 30); 
            if (startY > height - 250) startY = height - 250; 

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    aliens.push(new Alien(startX + c * (40 + padding), startY + r * (30 + padding)));
                }
            }
            alienDirection = 1;
            
            currentAlienSpeed = 1.0 + (level * 0.9);
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        let keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && gameState === "PLAY") fireBullet();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        const setupButton = (id, keyMap) => {
            const btn = document.getElementById(id);
            ['mousedown', 'touchstart'].forEach(evt => btn.addEventListener(evt, (e) => { e.preventDefault(); keys[keyMap] = true; if(keyMap==='Space' && gameState==="PLAY") fireBullet(); }));
            ['mouseup', 'touchend', 'mouseleave'].forEach(evt => btn.addEventListener(evt, (e) => { e.preventDefault(); keys[keyMap] = false; }));
        };
        setupButton('btnLeft', 'ArrowLeft');
        setupButton('btnRight', 'ArrowRight');
        setupButton('btnFire', 'Space');

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.y = height - 80;
            if (gameState === "START" || gameState === "GAMEOVER") player.x = width / 2 - player.width / 2;
        }
        window.addEventListener('resize', resize);

        function fireBullet() {
            if (bullets.length > 0 && bullets[bullets.length-1].y > player.y - 50) return;
            bullets.push(new Bullet(player.x + player.width / 2 - 3, player.y));
            playSound('shoot');
        }

        function update() {
            if (gameState !== "PLAY") return;

            if (keys.ArrowLeft && player.x > 0) player.x -= player.speed;
            if (keys.ArrowRight && player.x + player.width < width) player.x += player.speed;

            bullets.forEach(b => b.update());
            bullets = bullets.filter(b => b.active);

            let hitEdge = false;
            let lowestAlienY = 0;
            let livingAliens = 0;

            aliens.forEach(alien => {
                if (!alien.alive) return;
                livingAliens++;
                alien.x += currentAlienSpeed * alienDirection;
                if (alien.x <= 10 || alien.x + alien.width >= width - 10) hitEdge = true;
                lowestAlienY = Math.max(lowestAlienY, alien.y + alien.height);
            });

            if (hitEdge) {
                alienDirection *= -1;
                aliens.forEach(a => a.y += 20); 
            }

            if (lowestAlienY >= player.y) {
                endGame();
                return;
            }

            if (livingAliens === 0) {
                level++;
                score += 1000;
                document.getElementById('levelDisplay').innerText = level;
                document.getElementById('scoreDisplay').innerText = score;
                createAlienWave();
            }

            let speedMultiplier = 1 + (1 - livingAliens / aliens.length);
            if(livingAliens > 0) {
                currentAlienSpeed = (1.3 + (level * 0.7)) * speedMultiplier;
            }

            checkCollisions();
        }

        function checkCollisions() {
            bullets.forEach(bullet => {
                if (!bullet.active) return;
                aliens.forEach(alien => {
                    if (!alien.alive) return;
                    if (bullet.x < alien.x + alien.width &&
                        bullet.x + bullet.width > alien.x &&
                        bullet.y < alien.y + alien.height &&
                        bullet.y + bullet.height > alien.y) {
                        
                        alien.alive = false;
                        bullet.active = false;
                        score += 100;
                        killsSinceLastQuiz++;
                        playSound('hit');
                        document.getElementById('scoreDisplay').innerText = score;

                        if (killsSinceLastQuiz >= KILLS_TO_TRIGGER_QUIZ) {
                            killsSinceLastQuiz = 0;
                            triggerQuiz();
                        }
                    }
                });
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            player.draw();
            bullets.forEach(b => b.draw());
            aliens.forEach(a => a.draw());
        }

        function gameLoop() {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            resize();
            score = 0;
            level = 1;
            killsSinceLastQuiz = 0;
            bullets = [];
            
            // Αρχικοποίηση/Επαναφορά της δεξαμενής των διαθέσιμων ερωτήσεων
            activeQuestionsPool = [...questionsPool];

            document.getElementById('scoreDisplay').innerText = score;
            document.getElementById('levelDisplay').innerText = level;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('controls-container').classList.remove('hidden');
            
            player.x = width / 2 - player.width / 2;
            createAlienWave();
            gameState = "PLAY";
            gameLoop();
        }

        function endGame() {
            gameState = "GAMEOVER";
            cancelAnimationFrame(animationId);
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScore').innerText = score;
            document.getElementById('finalLevel').innerText = level;
            document.getElementById('controls-container').classList.add('hidden');
        }

        // ==========================================
        // QUIZ LOGIC
        // ==========================================
        let currentQuestion = null;

        function triggerQuiz() {
            gameState = "QUIZ";
            
            // Αν τελείωσαν όλες οι ερωτήσεις, ξαναγεμίζουμε τη λίστα για ασφάλεια
            if (activeQuestionsPool.length === 0) {
                activeQuestionsPool = [...questionsPool];
            }

            // Επιλογή τυχαίας ερώτησης και αφαίρεσή της από τη λίστα (splice)
            const randomIndex = Math.floor(Math.random() * activeQuestionsPool.length);
            currentQuestion = activeQuestionsPool.splice(randomIndex, 1)[0];

            const modal = document.getElementById('questionModal');
            const container = document.getElementById('answersContainer');
            document.getElementById('questionText').innerText = currentQuestion.q;
            container.innerHTML = '';

            currentQuestion.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(index);
                container.appendChild(btn);
            });
            modal.style.display = 'block';
            document.getElementById('controls-container').classList.add('hidden');
        }

        function handleAnswer(selectedIndex) {
            const modal = document.getElementById('questionModal');
            modal.style.display = 'none';
            const feedback = document.getElementById('feedbackMsg');

            if (selectedIndex === currentQuestion.correct) {
                playSound('correct');
                score += 500;
                feedback.innerText = "ΣΩΣΤΟ! +500";
                feedback.style.color = "#00ff00";
            } else {
                playSound('wrong');
                score = Math.max(0, score - 200);
                feedback.innerText = "ΛΑΘΟΣ! -200";
                feedback.style.color = "red";
            }
            document.getElementById('scoreDisplay').innerText = score;
            feedback.style.opacity = 1;
            setTimeout(() => { feedback.style.opacity = 0; }, 1000);

            document.getElementById('controls-container').classList.remove('hidden');
            gameState = "PLAY";
            keys['Space'] = false; 
        }

        resize();
		if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
    </script>
</body>
</html>
